<!DOCTYPE html>
<html>
<head>
  <title>AI Health Assistant</title>
  <style>
    .page { display: none; padding-top:50px; }
    .active { display: block; }
    button { padding: 10px 15px; margin:5px; cursor:pointer; }
  </style>
</head>
<body>
<div id="loginPage" class="page active">
  <h2>Login Page</h2>
  <input id="username" placeholder="Enter Name">
  <button onclick="goToHome()">Continue</button>
</div>

<div id="homePage" class="page">
  <h2>Home Page</h2>
  <input id="problem" placeholder="Describe problem">
  <button onclick="analyze()">Analyze</button>
</div>

<div id="resultPage" class="page">
  <h2>Result Page</h2>
  <div id="result"></div>
  <button onclick="goBack()">Back</button>
</div>

<script>
function showPage(pageId){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
}

function goToHome(){
  const name = document.getElementById("username").value.trim();
  if(!name){ alert("Enter name"); return; }
  showPage("homePage");
}

function goBack(){ showPage("homePage"); }

function analyze(){
  const p = document.getElementById("problem").value;
  document.getElementById("result").innerHTML = `<p>You wrote: ${p}</p>`;
  showPage("resultPage");
}
</script>
</body>
</html>
