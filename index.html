<!DOCTYPE html>
<html>
<head>
  <title>AI Health Assistant</title>
  <style>
    body { font-family: Arial; margin:0; background: linear-gradient(135deg,#1e3c72,#2a5298); color:white; text-align:center; }
    .page { display:none; padding-top:50px; }
    .active { display:block; }
    .card { background: rgba(255,255,255,0.1); padding:30px; border-radius:15px; display:inline-block; backdrop-filter:blur(10px); }
    input { padding:10px; margin:10px; width:250px; border-radius:5px; border:none; }
    button { padding:10px 15px; margin:5px; border:none; border-radius:5px; cursor:pointer; background:#00c6ff; color:black; font-weight:bold; }
    #result { text-align:left; margin-top:20px; }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page active">
  <div class="card">
    <h2>AI Health Assistant</h2>
    <input id="username" placeholder="Enter Name"><br>
    <button onclick="goToHome()">Continue</button>
  </div>
</div>

<!-- HOME PAGE -->
<div id="homePage" class="page">
  <div class="card">
    <h2>Enter Health Details</h2>
    <input id="age" placeholder="Age"><br>
    <input id="weight" placeholder="Weight"><br>
    <input id="problem" placeholder="Describe problem"><br>
    <button onclick="startVoice()">🎤 Voice</button>
    <button onclick="analyze()">Analyze</button>
  </div>
</div>

<!-- RESULT PAGE -->
<div id="resultPage" class="page">
  <div class="card">
    <h2>Health Report</h2>
    <div id="result"></div>
    <button onclick="goBack()">Back</button>
  </div>
</div>

<script>
  // PAGE SWITCH
  function showPage(pageId){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
  }

  function goToHome(){
    const name = document.getElementById("username").value.trim();
    if(!name){ alert("Enter your name"); return; }
    showPage("homePage");
  }

  function goBack(){ showPage("homePage"); }

  // VOICE INPUT
  function startVoice(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){ alert("Voice not supported"); return; }
    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.onresult = e => document.getElementById("problem").value = e.results[0][0].transcript;
    recognition.start();
  }

  // AI ANALYSIS
  function analyze(){
    const p = document.getElementById("problem").value.toLowerCase();
    let title="", explanation="", advice="", reminder="";

    // SWEATING
    if(p.includes("sweating") || p.includes("hyperhidrosis")){
      title="Hyperhidrosis";
      explanation="Excess sweating due to overactive sweat glands.";
      advice="Stay cool, wear breathable clothes.";
      reminder="Drink water frequently.";
    }
    // FEVER
    else if(p.includes("fever") || p.includes("temperature") || p.includes("hot")){
      title="Fever";
      explanation="Rise in body temperature due to infection.";
      advice="Rest and drink fluids.";
      reminder="Check temperature regularly.";
    }
    // COLD/COUGH
    else if(p.includes("cold") || p.includes("cough") || p.includes("flu")){
      title="Cold / Cough";
      explanation="Common viral infection.";
      advice="Drink warm fluids, eat vitamin C rich food.";
      reminder="Avoid cold drinks and rest well.";
    }
    // STOMACH
    else if(p.includes("stomach") || p.includes("tummy") || p.includes("gas") || p.includes("vomit") || p.includes("diarrhea")){
      title="Digestive Issue";
      explanation="Problem related to digestion.";
      advice="Avoid junk food, eat light meals.";
      reminder="Drink warm water and rest.";
    }
    // HEADACHE
    else if(p.includes("headache") || p.includes("migraine") || p.includes("ache")){
      title="Headache / Migraine";
      explanation="May be due to stress, dehydration, or eyestrain.";
      advice="Rest, hydrate, reduce screen time.";
      reminder="Avoid bright lights.";
    }
    // DEFAULT
    else {
      title="General Health Observation";
      explanation=`Based on your input: "${p}", it may be a mild health issue.`;
      advice="Monitor symptoms, stay hydrated and rest.";
      reminder="Consult a doctor if it worsens.";
    }

    // SHOW RESULTS
    document.getElementById("result").innerHTML = `
      <h3>${title}</h3>
      <p><b>Explanation:</b> ${explanation}</p>
      <p><b>Advice:</b> ${advice}</p>
      <p><b>Precautions / Reminder:</b> ${reminder}</p>
    `;

    // SWITCH PAGE
    showPage("resultPage");
  }
</script>

</body>
</html>
